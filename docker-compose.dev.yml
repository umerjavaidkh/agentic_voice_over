# docker-compose.dev.yml

services:
  postgres:
    image: pgvector/pgvector:pg16        # pgvector included, no extra install
    environment:
      POSTGRES_DB: voice_agent_dev
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite   # Azure Blob Storage emulator
    ports:
      - "10000:10000"   # Blob service
      - "10001:10001"   # Queue service
      - "10002:10002"   # Table service
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck

  voice-gateway:
    build: ./services/voice-gateway
    ports: ["8000:8000"]
    env_file: .env.dev
    depends_on: [redis, azurite]

  agent-brain:
    build: ./services/agent-brain
    ports: ["8001:8001"]
    env_file: .env.dev
    depends_on: [postgres, redis]

  pricing-service:
    build: ./services/pricing-service
    ports: ["8002:8002"]
    env_file: .env.dev
    depends_on: [postgres]

  dispatch-adapter:
    build: ./services/dispatch-adapter
    ports: ["8003:8003"]
    env_file: .env.dev

  notification-service:
    build: ./services/notification-service
    ports: ["8004:8004"]
    env_file: .env.dev

volumes:
  postgres_data:
  azurite_data:
