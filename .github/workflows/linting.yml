name: Linting & Code Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort pylint mypy
      
      - name: Run Ruff
        run: ruff check services/ shared/ tests/ --exit-zero || true
      
      - name: Check formatting with Black
        run: black --check services/ shared/ tests/ || true
      
      - name: Check import sorting
        run: isort --check-only services/ shared/ tests/ || true
      
      - name: Type checking with mypy
        run: mypy services/ shared/ --ignore-missing-imports || true